services:
  db:
    image: postgres:16-alpine
    container_name: ex1_db
    restart: always
    environment:
      POSTGRES_DB: ex1_db
      POSTGRES_USER: ex1_user
      POSTGRES_PASSWORD: ex1_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ex1_user -d ex1_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ex1_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ex1_db
      SPRING_DATASOURCE_USERNAME: ex1_user
      SPRING_DATASOURCE_PASSWORD: ex1_password
    ports:
      - "8080:8080"

  frontend:
    image: node:22-alpine
    container_name: ex1_frontend
    working_dir: /app
    restart: always
    volumes:
      - ../ex1-front:/app
      - /app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:5173"

volumes:
  postgres_data:
